<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Simulator deploy project untuk mencoba checklist cPanel, konfigurasi koneksi database, dan catatan phpMyAdmin secara aman." />
    <title>Simulator - Deploy Project Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css?v=20260619" />
  </head>
  <body data-page="editor">
    <div id="appNav"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <span class="eyebrow"><i class="bi bi-terminal"></i> Simulator</span>
          <h1>Coba checklist deploy tanpa takut merusak project</h1>
          <p>Tulis alur cPanel, koneksi database, dan catatan phpMyAdmin. Simulator akan membaca checklist dan menampilkan status kesiapan hosting.</p>
        </div>
      </section>

      <section class="section-block editor-section">
        <div class="container">
          <div class="editor-toolbar">
            <div class="editor-tabs" role="tablist" aria-label="Panel simulator">
              <button class="editor-tab active" type="button" data-editor-tab="checklist"><i class="bi bi-list-check"></i> Checklist</button>
              <button class="editor-tab" type="button" data-editor-tab="connection"><i class="bi bi-database-gear"></i> Koneksi</button>
              <button class="editor-tab" type="button" data-editor-tab="database"><i class="bi bi-table"></i> Database</button>
            </div>
            <div class="editor-actions">
              <button id="runEditor" class="btn btn-primary" type="button"><i class="bi bi-play-fill"></i> Jalankan</button>
              <button id="resetEditor" class="btn btn-soft" type="button"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
            </div>
          </div>

          <div class="editor-grid">
            <div class="editor-shell">
              <div class="editor-panel active" data-editor-panel="checklist">
                <div class="editor-title"><i class="bi bi-list-check"></i> checklist deploy</div>
                <textarea id="checklistInput" class="code-input" spellcheck="false"></textarea>
              </div>
              <div class="editor-panel" data-editor-panel="connection">
                <div class="editor-title"><i class="bi bi-database-gear"></i> koneksi.php atau .env</div>
                <textarea id="connectionInput" class="code-input" spellcheck="false"></textarea>
              </div>
              <div class="editor-panel" data-editor-panel="database">
                <div class="editor-title"><i class="bi bi-table"></i> catatan phpMyAdmin</div>
                <textarea id="databaseInput" class="code-input" spellcheck="false"></textarea>
              </div>
            </div>

            <div class="preview-shell">
              <div class="preview-head">
                <span><i class="bi bi-cloud-check"></i> Deploy Preview</span>
                <strong id="deployScore">0%</strong>
              </div>
              <div id="deployPreview" class="deploy-preview"></div>
            </div>
            <div class="editor-console-shell">
              <div class="preview-head">
                <span><i class="bi bi-terminal"></i> Console</span>
                <strong>simulated</strong>
              </div>
              <pre id="editorConsole" class="console-output"></pre>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="appFooter"></div>
    <div id="appToast"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/progress.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/app.js?v=20260619"></script>
    <script src="assets/js/editor.js?v=20260619"></script>
  </body>
</html>
